name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        php-version: ['8.3', '8.4']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP ${{ matrix.php-version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: phar, json, zip, mbstring
          coverage: none

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd ast && npm install

      - name: Make CLI executable
        run: chmod +x pak-it

      - name: Verify PHP syntax of all source files
        run: |
          find src/ Commands/ -name "*.php" -exec php -l {} \; 2>&1 | (! grep -v "No syntax errors")
        continue-on-error: false

      - name: Prepare test fixture (is-number npm pack)
        run: |
          npm pack is-number@7.0.0 --pack-destination /tmp 2>&1
          tar -xzf /tmp/is-number-7.0.0.tgz -C /tmp/

      - name: Run functional tests (JS vs PHP output comparison)
        run: php tests/functional.php
        continue-on-error: false

      - name: Test init (is-number)
        run: php pak-it init is-number
        continue-on-error: false

      - name: Test verify command
        run: php pak-it verify
        continue-on-error: false

      - name: Test syntax check on converted files
        run: |
          find vendor/ -name "*.php" -exec php -l {} \; 2>&1 | (! grep -v "No syntax errors")
        continue-on-error: false

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: phar, json
          coverage: none

      - name: Check PHP coding standards
        run: |
          find . -name "*.php" -not -path "*/vendor/*" -not -path "*/node_modules/*" -exec php -l {} \;
        continue-on-error: false
